<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendário Acadêmico 2026.2 — UniFECAF</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --blue:      #0E77CC; --blue-dark: #1A3666; --blue-deep: #242149;
    --green:     #17A460; --green-lt:  #33DB89;
    --white:     #ffffff; --bg: #f0f4fa;
    --g100: #e2e8f4; --g300: #c4cfe0; --g500: #7a8faa; --g700: #3d5068; --g900: #1a2535;
    --c-feriado: #e05252; --c-avaliacao: #d97706; --c-ead: #0891b2; --c-importante: #17A460; --c-evento: #7c3aed;
    --bgreen: #33DB89;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Montserrat", sans-serif; background: var(--bg); color: var(--g900); min-height: 100vh; }

  .top-banner { background: linear-gradient(100deg, #242149 0%, #1A3666 60%, #0E77CC 100%); padding: 18px 48px 14px; display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; }
  .banner-left { display: flex; flex-direction: column; align-items: flex-start; gap: 6px; }
  .banner-left img { height: 36px; }
  .banner-cal-label { font-family: "Poppins", sans-serif; font-size: 13px; font-weight: 600; color: rgba(255,255,255,.7); letter-spacing: .04em; }
  .banner-pill { background: var(--bgreen); color: #04342C; font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; padding: 5px 14px; border-radius: 20px; }
  .subheader { background: var(--white); border-bottom: 3px solid var(--blue); padding: 12px 48px; display: flex; align-items: center; flex-wrap: wrap; gap: 12px; }
  .legend { display: flex; flex-wrap: wrap; gap: 10px; }
  .leg { display: flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600; color: var(--g700); }
  .ldot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .controls { background: var(--white); border-bottom: 1px solid var(--g100); padding: 10px 48px; }
  .controls-inner { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .search-wrap { position: relative; flex: 1; min-width: 180px; }
  .search-wrap input { width: 100%; border: 1.5px solid var(--g100); background: var(--bg); color: var(--g900); font-family: "Montserrat", sans-serif; font-size: 12px; font-weight: 500; padding: 7px 14px 7px 34px; border-radius: 30px; outline: none; transition: border-color .2s, box-shadow .2s; }
  .search-wrap input:focus { border-color: var(--bgreen); box-shadow: 0 0 0 3px rgba(51,219,137,.15); }
  .search-wrap input::placeholder { color: var(--g300); }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--g300); font-size: 13px; pointer-events: none; }
  .view-toggle { display: flex; border: 1.5px solid var(--g100); border-radius: 8px; overflow: hidden; flex-shrink: 0; }
  .view-btn { padding: 7px 13px; background: transparent; border: none; cursor: pointer; font-family: "Montserrat", sans-serif; font-size: 11px; font-weight: 700; color: var(--g500); transition: all .2s; }
  .view-btn.active { background: var(--blue); color: white; }
  .chip { font-family: "Montserrat", sans-serif; font-size: 11px; font-weight: 700; padding: 6px 13px; border-radius: 20px; border: 1.5px solid var(--g100); background: transparent; color: var(--g500); cursor: pointer; transition: all .2s; white-space: nowrap; }
  .chip:hover { border-color: var(--bgreen); color: var(--green); background: rgba(51,219,137,.07); }
  .chip.active { background: var(--blue); color: white; border-color: var(--blue); }
  main { max-width: 1200px; margin: 0 auto; padding: 28px 48px 80px; }
  .loading { text-align: center; padding: 80px 20px; color: var(--g500); }
  .spinner { width: 36px; height: 36px; border: 3px solid var(--g100); border-top-color: var(--blue); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeUp { to { opacity: 1; transform: none; } }
  .empty { text-align: center; padding: 60px 20px; color: var(--g500); font-size: 14px; font-weight: 600; }
  .calendar-grid { display: flex; flex-direction: column; gap: 16px; }
  .cal-month { background: var(--white); border-radius: 16px; overflow: hidden; border: 1.5px solid var(--bgreen); box-shadow: 0 2px 12px rgba(51,219,137,.1), 0 2px 8px rgba(26,54,102,.06); display: grid; grid-template-columns: 280px 1fr; opacity: 0; transform: translateY(14px); animation: fadeUp .4s ease forwards; }
  .cal-left { border-right: 1.5px solid var(--bgreen); }
  .cal-month-header { background: linear-gradient(100deg, #1A3666 0%, #0E77CC 100%); padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; }
  .cal-month-name { font-family: "Poppins", sans-serif; font-size: 14px; font-weight: 700; color: white; }
  .cal-month-count { font-size: 10px; font-weight: 600; background: rgba(255,255,255,.18); color: white; padding: 2px 8px; border-radius: 20px; }
  .mini-cal { padding: 12px 14px 10px; }
  .mini-cal-dow { display: grid; grid-template-columns: repeat(7,1fr); margin-bottom: 4px; }
  .mini-cal-dow span { text-align: center; font-size: 9px; font-weight: 700; color: var(--g300); text-transform: uppercase; }
  .mini-cal-days { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; }
  .mday { aspect-ratio:1; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:600; border-radius:5px; color:var(--g700); border:1px solid transparent; position:relative; }
  .mday.sun { color: #e05252; } .mday.sat { color: var(--g300); }
  .mday.has-ev { background: rgba(51,219,137,.1); border-color: rgba(51,219,137,.4); color: var(--blue-dark); font-weight: 800; }
  .mday.has-ev::after { content:""; position:absolute; bottom:2px; left:50%; transform:translateX(-50%); width:4px; height:4px; border-radius:50%; background:var(--bgreen); }
  .cal-right { padding: 6px 0; }
  .cal-ev-row { display: grid; grid-template-columns: 62px 10px 1fr; align-items: flex-start; gap: 10px; padding: 8px 18px; border-bottom: 1px solid rgba(51,219,137,.2); transition: background .15s; }
  .cal-ev-row:last-child { border-bottom: none; }
  .cal-ev-row:hover { background: rgba(51,219,137,.05); }
  .cal-ev-date { font-size: 11px; font-weight: 700; color: var(--g500); padding-top: 1px; white-space: nowrap; }
  .cal-ev-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 3px; }
  .cal-ev-text { font-size: 12px; font-weight: 500; color: var(--g700); line-height: 1.45; }
  .month-block { margin-bottom: 40px; opacity: 0; transform: translateY(14px); animation: fadeUp .4s ease forwards; }
  .month-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 2px solid var(--bgreen); }
  .month-name { font-family: "Poppins", sans-serif; font-size: 19px; font-weight: 800; color: var(--blue-deep); letter-spacing: -.02em; }
  .month-year { font-size: 12px; font-weight: 600; color: var(--g500); }
  .month-count { margin-left: auto; font-size: 10px; font-weight: 600; color: var(--g500); background: var(--bg); border: 1.5px solid var(--bgreen); padding: 3px 9px; border-radius: 20px; }
  .event-card { display: grid; grid-template-columns: 8px 96px 1fr auto; align-items: center; gap: 10px; padding: 10px 14px; margin-bottom: 5px; border-radius: 10px; background: var(--white); border: 1.5px solid var(--bgreen); transition: border-color .15s, transform .15s; }
  .event-card:hover { border-color: var(--blue); transform: translateX(2px); }
  .ev-dot { width: 8px; height: 8px; border-radius: 50%; } .ev-date { font-size: 11px; font-weight: 600; color: var(--g500); }
  .ev-text { font-size: 12px; font-weight: 500; color: var(--g700); line-height: 1.4; }
  .ev-tag { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; white-space: nowrap; text-transform: uppercase; letter-spacing: .04em; }
  .tag-feriado    { background: rgba(224,82,82,.1);   color: #c0392b; }
  .tag-avaliacao  { background: rgba(217,119,6,.1);   color: #b45309; }
  .tag-ead        { background: rgba(8,145,178,.1);   color: #0e7490; }
  .tag-importante { background: rgba(23,164,96,.1);   color: #0d7a4a; }
  .tag-evento     { background: rgba(124,58,237,.1);  color: #6d28d9; }
  footer { background: linear-gradient(100deg, #242149 0%, #1A3666 100%); padding: 20px 48px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  footer img { height: 22px; }
  .foot-mid { text-align: center; } .foot-sync { font-size: 10px; color: rgba(255,255,255,.45); font-weight: 500; }
  .foot-dev { font-size: 11px; color: rgba(255,255,255,.75); font-weight: 600; margin-top: 3px; }
  .foot-dev span { color: var(--green-lt); }
  .foot-copy { font-size: 10px; color: rgba(255,255,255,.35); font-weight: 500; }
  @media (max-width: 700px) {
    .top-banner, .subheader, .controls, main, footer { padding-left: 16px; padding-right: 16px; }
    .cal-month { grid-template-columns: 1fr; }
    .cal-left { border-right: none; border-bottom: 1.5px solid var(--bgreen); }
    .legend { display: none; }
    footer { flex-direction: column; align-items: flex-start; }
    .event-card { grid-template-columns: 8px 80px 1fr; } .ev-tag { display: none; }
  }
</style>
</head>

  }
  document.querySelectorAll(".chip").forEach(function(c) {
    c.addEventListener("click", function() {
      document.querySelectorAll(".chip").forEach(function(x){ x.classList.remove("active"); });
      c.classList.add("active"); activeFilter = c.dataset.filter; render();
    });
  });
  document.getElementById("search").addEventListener("input", function(e) {
    searchTerm = e.target.value.toLowerCase().trim(); render();
  });
  function filterEvents(events) {
    return events.filter(function(ev) {
      return (activeFilter === "all" || ev.type === activeFilter) &&
             (!searchTerm || ev.description.toLowerCase().includes(searchTerm) || ev.date.toLowerCase().includes(searchTerm));
    });
  }
  function render() { currentView === "calendar" ? renderCalendar() : renderList(); }
  function renderCalendar() {
    var main = document.getElementById("main");
    main.innerHTML = '<div class="calendar-grid" id="cal-grid"></div>';
    var grid = document.getElementById("cal-grid");
    var any = false;
    calendarData.forEach(function(month, idx) {
      var events = filterEvents(month.events);
      if (!events.length) return;
      any = true;
      var mNum = MONTH_NUMBERS[month.name] || 1;
      var block = document.createElement("div");
      block.className = "cal-month";
      block.style.animationDelay = (idx * 60) + "ms";
      block.innerHTML =
        '<div class="cal-left"><div class="cal-month-header"><span class="cal-month-name">' + month.name + ' 2026</span><span class="cal-month-count">' + events.length + ' evento' + (events.length>1?"s":"") + '</span></div>' + buildMiniCal(mNum, 2026, getEventDays(events)) + '</div>' +
        '<div class="cal-right">' + buildCalEventList(events) + '</div>';
      grid.appendChild(block);
    });
    if (!any) main.innerHTML = '<div class="empty">Nenhum evento encontrado.</div>';
  }
  function buildMiniCal(month, year, eventDays) {
    var firstDow = new Date(year, month-1, 1).getDay();
    var daysInMo = new Date(year, month, 0).getDate();
    var header = ["D","S","T","Q","Q","S","S"].map(function(d){ return "<span>"+d+"</span>"; }).join("");
    var cells = "";
    for (var i=0; i<firstDow; i++) cells += '<div class="mday"></div>';
    for (var d=1; d<=daysInMo; d++) {
      var dow = (firstDow+d-1)%7;
      var cls = "mday"+(dow===0?" sun":dow===6?" sat":"")+(eventDays[d]?" has-ev":"");
      cells += '<div class="'+cls+'">'+d+'</div>';
    }
    return '<div class="mini-cal"><div class="mini-cal-dow">'+header+'</div><div class="mini-cal-days">'+cells+'</div></div>';
  }
  function getEventDays(events) {
    var days = {};
    events.forEach(function(ev) {
      var nums = ev.date.match(/\d+/g);
      if (!nums) return;
      if (nums.length===1) { days[+nums[0]]=true; }
      else { for (var d=+nums[0]; d<=+nums[1]; d++) days[d]=true; }
    });
    return days;
  }
  function buildCalEventList(events) {
    return events.map(function(ev) {
      var color = TYPE_COLORS[ev.type] || "#7a8faa";
      return '<div class="cal-ev-row"><span class="cal-ev-date">'+ev.date+'</span><div class="cal-ev-dot" style="background:'+color+'"></div><span class="cal-ev-text">'+ev.description+'</span></div>';
    }).join("");
  }
  function renderList() {
    var main = document.getElementById("main");
    main.innerHTML = '<div id="list-wrap"></div>';
    var wrap = document.getElementById("list-wrap");
    var any = false;
    calendarData.forEach(function(month, idx) {
      var events = filterEvents(month.events);
      if (!events.length) return;
      any = true;
      var block = document.createElement("div");
      block.className = "month-block";
      block.style.animationDelay = (idx*60)+"ms";
      block.innerHTML =
        '<div class="month-header"><span class="month-name">'+month.name+'</span><span class="month-year">2026</span><span class="month-count">'+events.length+' evento'+(events.length>1?"s":"")+'</span></div>' +
        events.map(function(ev) {
          var color = TYPE_COLORS[ev.type]||"#7a8faa";
          return '<div class="event-card"><div class="ev-dot" style="background:'+color+'"></div><span class="ev-date">'+ev.date+'</span><span class="ev-text">'+ev.description+'</span><span class="ev-tag tag-'+ev.type+'">'+TYPE_LABELS[ev.type]+'</span></div>';
        }).join("");
      wrap.appendChild(block);
    });
    if (!any) main.innerHTML = '<div class="empty">Nenhum evento encontrado.</div>';
  }
</script>
</body>
</html>
